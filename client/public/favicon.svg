<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#6EE7B7" />
    </linearGradient>
  </defs>
  
  <!-- Background Rounded Rect with Premium Dark Midnight Fill -->
  <rect width="512" height="512" rx="128" fill="#090D16" />
  
  <!-- Subtle Grid lines -->
  <g opacity="0.08">
    <line x1="128" y1="0" x2="128" y2="512" stroke="#FFFFFF" stroke-width="4" />
    <line x1="256" y1="0" x2="256" y2="512" stroke="#FFFFFF" stroke-width="4" />
    <line x1="384" y1="0" x2="384" y2="512" stroke="#FFFFFF" stroke-width="4" />
    <line x1="0" y1="128" x2="512" y2="128" stroke="#FFFFFF" stroke-width="4" />
    <line x1="0" y1="256" x2="512" y2="256" stroke="#FFFFFF" stroke-width="4" />
    <line x1="0" y1="384" x2="512" y2="384" stroke="#FFFFFF" stroke-width="4" />
  </g>

  <!-- Glowing Outer Frame border -->
  <rect x="32" y="32" width="448" height="448" rx="108" fill="none" stroke="url(#glowGrad)" stroke-width="16" opacity="0.8" />

  <!-- Coach/Interview Icon with Brain Nodes -->
  <g transform="translate(64, 64)">
    <path d="M120,280 C120,200 160,160 220,160 C250,160 270,175 285,190" fill="none" stroke="url(#brainGrad)" stroke-width="24" stroke-linecap="round" />
    <path d="M260,100 C320,100 370,150 370,210 C370,270 320,320 260,320 C240,320 220,310 205,300 L150,330 L165,275 C150,256 140,234 140,210 C140,150 190,100 260,100 Z" fill="url(#glowGrad)" />
    <text x="258" y="248" font-family="'Outfit', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="120" fill="#090D16" text-anchor="middle">A</text>
  </g>
